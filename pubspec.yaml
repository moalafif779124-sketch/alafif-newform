name: alafif_newform
description: تطبيق ألافيف نيوفورم للملابس الرجالية الفاخرة
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.19.0
  
  # Firebase
  firebase_core: ^3.12.0
  firebase_auth: ^5.5.0
  cloud_firestore: ^5.6.0
  firebase_storage: ^12.4.0
  
  # State Management
  provider: ^6.1.2
  
  # UI Components
  carousel_slider: ^5.0.0
  cached_network_image: ^3.4.1
  badges: ^3.1.2
  flutter_rating_bar: ^4.0.1
  
  # Image Processing
  image_picker: ^1.1.2
  path_provider: ^2.1.4
  
  # AR / Virtual Try-On
  camera: ^0.11.1
  google_mlkit_pose_detection: ^0.12.0
  url_launcher: ^6.3.1
  
  # Payments
  http: ^1.2.2
  
  # QR Code
  qr_flutter: ^4.1.0
  
  # Local Storage
  shared_preferences: ^2.3.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/fonts/
  
  fonts: []
