name: Build ALAFIF NEWFORM APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch: # تشغيل يدوي

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ سحب الكود
        uses: actions/checkout@v4

      - name: ☕ إعداد Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 📥 إعداد Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
          channel: 'stable'

      - name: 🔧 تثبيت الاعتماديات
        run: flutter pub get

      - name: 🔑 فك Keystore من Secret (ثابت لكل بناء)
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/keystore.p12

      - name: 📱 بناء APK (Release - arm64-v8a فقط)
        run: flutter build apk --release --target-platform android-arm64

      - name: 📤 رفع ملفات APK
        uses: actions/upload-artifact@v4
        with:
          name: alafif-newform-apk
          path: |
            build/app/outputs/flutter-apk/*.apk
          compression-level: 9

      - name: 🚀 رفع APK إلى GitHub Release
        run: |
          # رفع APK باستخدام GitHub API مباشرة (بدون gh CLI)
          echo "📤 رفع APK إلى jeeb-v1..."
          UPLOAD_URL="https://uploads.github.com/repos/$GITHUB_REPOSITORY/releases/333416472/assets?name=app-arm64-v8a-release.apk"
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/vnd.android.package-archive" \
            --data-binary @build/app/outputs/flutter-apk/app-arm64-v8a-release.apk \
            "$UPLOAD_URL" \
            -w "\nHTTP:%{http_code}\n" | tail -1
          echo ""
          echo "✅ APK uploaded"
          echo "📎 https://github.com/$GITHUB_REPOSITORY/releases/download/jeeb-v1/app-arm64-v8a-release.apk"

      - name: 📋 عرض المخرجات
        run: |
          echo "✅ تم بناء التطبيق بنجاح!"
          ls -lh build/app/outputs/flutter-apk/
