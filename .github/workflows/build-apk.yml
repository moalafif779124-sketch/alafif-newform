name: Build ALAFIF NEWFORM APK

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch: # تشغيل يدوي

# فرض Node.js 24 لتجنب تحذير الإهمال
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ سحب الكود
        uses: actions/checkout@v4

      - name: ☕ إعداد Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 📥 إعداد Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
          channel: 'stable'

      - name: 🔧 تثبيت الاعتماديات
        run: flutter pub get

      - name: 🔑 إنشاء Keystore للتوقيع
        run: |
          cd android/app
          rm -f keystore.jks
          keytool -genkey -v -keystore keystore.jks -keyalg RSA -keysize 2048 \
            -validity 10000 -alias alafif \
            -storepass alafif2026 -keypass alafif2026 \
            -dname "CN=ALAFIF, OU=Dev, O=ALAFIF, L=Sanaa, ST=Sanaa, C=YE"

      - name: 📱 بناء APK (Debug)
        run: flutter build apk --debug

      - name: 📱 بناء APK (Release - مقسم)
        run: flutter build apk --release --split-per-abi

      - name: 📤 رفع ملفات APK
        uses: actions/upload-artifact@v4
        with:
          name: alafif-newform-apk
          path: |
            build/app/outputs/flutter-apk/*.apk
          compression-level: 9

      - name: 📋 عرض المخرجات
        run: |
          echo "✅ تم بناء التطبيق بنجاح!"
          ls -lh build/app/outputs/flutter-apk/
