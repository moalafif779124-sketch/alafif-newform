name: Build ALAFIF NEWFORM APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch: # تشغيل يدوي

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ سحب الكود
        uses: actions/checkout@v4

      - name: ☕ إعداد Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 📥 إعداد Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
          channel: 'stable'

      - name: 🔧 تثبيت الاعتماديات
        run: flutter pub get

      - name: 🔑 فك Keystore من Secret (ثابت لكل بناء)
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/keystore.p12

      - name: 📱 بناء APK (Release - arm64-v8a فقط)
        run: flutter build apk --release --target-platform android-arm64

      - name: 📤 رفع ملفات APK
        uses: actions/upload-artifact@v4
        with:
          name: alafif-newform-apk
          path: |
            build/app/outputs/flutter-apk/*.apk
          compression-level: 9

      - name: 🚀 رفع APK إلى GitHub Release
        run: |
          # لا تفشل لو delete فشل
          echo "🗑️ محاولة حذف الملف القديم..."
          ASSET_IDS=$(gh release view jeeb-v1 --json assets -q '.assets[] | select(.name=="app-arm64-v8a-release.apk") | .id' 2>/dev/null || echo "")
          for id in $ASSET_IDS; do
            echo "حذف asset $id..."
            gh api -X DELETE "repos/$GITHUB_REPOSITORY/releases/assets/$id" 2>/dev/null || echo "⚠️ لا يمكن حذف asset $id"
          done
          # رفع الـ APK الجديد
          echo "📤 رفع APK إلى jeeb-v1..."
          gh release upload jeeb-v1 build/app/outputs/flutter-apk/app-arm64-v8a-release.apk --clobber
          echo "✅ APK uploaded to release jeeb-v1"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}

      - name: 📋 عرض المخرجات
        run: |
          echo "✅ تم بناء التطبيق بنجاح!"
          ls -lh build/app/outputs/flutter-apk/
